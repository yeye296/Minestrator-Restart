name: Minestrator-Restart

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
    - cron: '0 5 * * *'   # 北京时间 13:00
    - cron: '0 9 * * *'   # 北京时间 17:00
    - cron: '0 13 * * *'  # 北京时间 21:00

jobs:
  run_minestrator_restart:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # - name: 🛡️ 启动 GOST 代理转发
      #   if: ${{ env.GOST_PROXY != '' }}
      #   env:
      #     GOST_PROXY: ${{ secrets.GOST_PROXY }}
      #   run: |
      #     VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
      #     echo "📦 GOST 版本: $VERSION"
      #     wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
      #     tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
      #     chmod +x gost
      #     nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
      #     sleep 3
      #     # echo "✅ GOST 已启动，测试连通性..."
      #     # curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      - name: 🛡️ 启动 Xray 代理转发
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG_JSON }}
        run: |
          echo "📦 下载并解压 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/download/v25.12.8/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray-core
          
          echo "📝 写入节点配置..."
          echo "$XRAY_CONFIG" > xray-core/config.json
          
          echo "🚀 启动 Xray 服务..."
          cd xray-core
          nohup ./xray run -c config.json > xray.log 2>&1 &
          sleep 3
          
          echo "✅ Xray 已启动，测试代理连通性并获取出口 IP..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org
          echo "" # 换行

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          # 修复：ubuntu-latest 默认源没有 google-chrome-stable，改用 seleniumbase 内置安装
          sudo apt-get install -y xvfb x11-utils xdotool scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver
          seleniumbase install chrome

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          MINESTRATOR_ACCOUNT: ${{ secrets.MINESTRATOR_ACCOUNT }}
          MINESTRATOR_SERVER_ID: ${{ secrets.MINESTRATOR_SERVER_ID }}
          MINESTRATOR_AUTH: ${{ secrets.MINESTRATOR_AUTH }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python restart_minestrator.py

      - name: 📸 上传截图（调试用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
